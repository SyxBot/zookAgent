<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zookAgent — Streaming Alpha Engine</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">zookAgent</span>
      <span class="version">v2</span>
      <span id="status-dot" class="dot disconnected" title="Stream status"></span>
      <span id="status-text" class="status-text">Disconnected</span>
    </div>
    <div class="header-stats" id="header-stats">
      <span class="hstat"><span class="hval" id="hs-total">0</span><span class="hlabel">events</span></span>
      <span class="hstat"><span class="hval" id="hs-reject">0%</span><span class="hlabel">rejected</span></span>
      <span class="hstat"><span class="hval" id="hs-scored">0</span><span class="hlabel">scored</span></span>
      <span class="hstat"><span class="hval" id="hs-emitted">0</span><span class="hlabel">signals</span></span>
      <span class="hstat"><span class="hval" id="hs-tokens">0</span><span class="hlabel">tokens</span></span>
      <span class="hstat"><span class="hval" id="hs-wallets">0</span><span class="hlabel">wallets</span></span>
    </div>
    <div class="header-right">
      <label class="threshold-label">
        Min score
        <input type="range" id="score-threshold" min="0" max="100" value="60" step="1" />
        <span id="threshold-val">60</span>
      </label>
      <button id="clear-btn" class="secondary">Clear</button>
    </div>
  </header>

  <main>
    <section id="feed">
      <div id="signal-grid"></div>
      <p id="empty-msg">Waiting for scored signals…</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
